<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="./style.css"/>
    <link rel="stylesheet" href="./event_styles.css"/>
	<link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <script type="module" src="./script.js" defer></script>
</head>
<body>
    <!-- NAVBAR -->
	<nav id="navbar">
		<div id="navtitle">
			<a href="/">sudoers</a>
		</div>
		<a href="https://github.com/Tharun-Kumar-A-01/FOSSTamilan"><button id="navgitbtn">Contribute</button></a>
	</nav>
	<div id="breadcrumbs">~/<a href="../../">sudoers</a>/<a href="../">events</a>/<p>admin</p></div>
   
	<!-- HERO SECTION  -->
	<div id="main-container">
	
    <div id="message" style="display: none;"></div>

    <h2>Pending Events</h2>
    <section class="events section">
		<div id="pending-events">
			<p>Loading...</p>
		</div>
	</section>
	
	<h2>Approved Events</h2>
	<section class="events section">
        <div id="approved-events">
            <p>Loading...</p>
        </div>
    </section>
	</div>

    <button id="logoutBtn">Logout</button>

   	<style>

		@font-face {
			font-family: 'Noto Serif Tamil';
			src: url('../fonts/Noto_Serif_Tamil/NotoSerifTamil_Regular.woff2') format('woff2');
			font-weight: normal;
			font-display: swap;
			font-style: normal;
		}

		@font-face {
			font-family: 'JetBrains Mono';
			font-style: normal;
			font-weight: normal;
			font-display: swap;
			src: url("../fonts/JetBrains_Mono/JetBrainsMono-Regular.woff2") format('woff2');
		}

		/* Ioskeley Mono - Bold */
		@font-face {
			font-family: 'JetBrains Mono';
			font-style: normal;
			font-weight: bold;
			font-display: swap;
			src: url("../fonts/JetBrains_Mono/JetBrainsMono-Bold.woff2") format('woff2');
		}

		/* Ioskeley Mono - MediumItalic */
		@font-face {
			font-family: 'JetBrains Mono';
			font-style: italic;
			font-weight: normal;
			font-display: swap;
			src: url("../fonts/JetBrains_Mono/JetBrainsMono-MediumItalic.woff2") format('woff2');
		}

	</style>

</body>

</html>
