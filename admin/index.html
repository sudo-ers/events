<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="./style.css"/>
    <link rel="stylesheet" href="./event_styles.css"/>
    <script type="module" src="./script.js" defer></script>
</head>
<body>
    <!-- NAVBAR -->
	<nav id="navbar">
		<div id="navtitle">
			<a href="/">sudoers</a>
		</div>
		<a href="https://github.com/Tharun-Kumar-A-01/FOSSTamilan"><button id="navgitbtn">Contribute</button></a>
	</nav>
	<div id="breadcrumbs">~/<a href="../../">sudoers</a>/<a href="../">events</a>/<p>admin</p></div>
   
	<!-- HERO SECTION  -->
	<div id="main-container">
	
    <div id="message" style="display: none;"></div>

    <h2>Pending Events</h2>
    <section class="events section">
		<div id="pending-events">
			<p>Loading...</p>
		</div>
	</section>
	
	<h2>Approved Events</h2>
	<section class="events section">
        <div id="approved-events">
            <p>Loading...</p>
        </div>
    </section>
	</div>

    <button id="logoutBtn">Logout</button>
    
   	<style>
		@font-face {
			font-family: 'Fira Code';
			src: url('../fonts/Fira_Code/FiraCode_Regular.woff2') format('woff2-variations');
			font-display: swap;
		}
				 /* Ioskeley Mono - Regular */
		@font-face {
			font-family: 'Ioskeley Mono';
			font-style: normal;
			font-weight: 400;
			font-display: swap;
			src: url("../fonts/Ioskeley_Mono/IoskeleyMono_Regular.woff2") format('woff2');
		}
   
		/* Ioskeley Mono - Bold */
		@font-face {
			font-family: 'Ioskeley Mono';
			font-style: normal;
			font-weight: 700;
			font-display: swap;
			src: url("../fonts/Ioskeley_Mono/IoskeleyMono_Bold.woff2") format('woff2');
		}
   
		/* Ioskeley Mono - ExtraBold */
		@font-face {
			font-family: 'Ioskeley Mono';
			font-style: normal;
			font-weight: 800;
			font-display: swap;
			src: url("../fonts/Ioskeley_Mono/IoskeleyMono_ExtraBold.woff2") format('woff2');
		}
   
		/* Ioskeley Mono - MediumItalic */
		@font-face {
			font-family: 'Ioskeley Mono';
			font-style: italic;
			font-weight: 500;
			font-display: swap;
			src: url("../fonts/Ioskeley_Mono/IoskeleyMono_MediumItalic.woff2") format('woff2');
		}
   
		/* Ioskeley Mono - BoldItalic */
		@font-face {
			font-family: 'Ioskeley Mono';
			font-style: italic;
			font-weight: 700;
			font-display: swap;
			src: url("../fonts/Ioskeley_Mono/IoskeleyMono_BoldItalic.woff2") format('woff2');
		}
   
		/* Ioskeley Mono - ExtraBoldItalic */
		@font-face {
			font-family: 'Ioskeley Mono';
			font-style: italic;
			font-weight: 800;
			font-display: swap;
			src: url("../fonts/Ioskeley_Mono/IoskeleyMono_ExtraBoldItalic.woff2") format('woff2');
		}
	</style>
</body>

</html>
